<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Machinations</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--Kings-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kings&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--Jacquard 24-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+24&family=Kings&display=swap" rel="stylesheet">
</head>

<body id="index-body">
    <div id="backgroundCurtains">
        <div id="curtain-left"></div>
        <div id="curtain-right"></div>
    </div>
    <nav>
        <h1>Kingdom Machinations</h1>
    </nav>

    <header class="border-container">
        <img src="images/border.png" alt="Decorative Border" class="border-img" id="scene">

        <div class="inner-content">
            <ul id="enemyStats" class="noEnemy">
                <li>Name: <span class="enemyName">--</span></li>
                <li>Health: <span class="enemyStat">0</span></li>
                <li>Strength: <span class="enemyStat">0</span></li>
                <li>Intelligence: <span class="enemyStat">0</span></li>
                <li>Fortitude: <span class="enemyStat">0</span></li>
                <li>Speed: <span class="enemyStat">0</span></li>
            </ul>

            <ul id="playerStats">
                <li>Health: <span class="playerStat">0</span></li>
                <li>Strength: <span class="playerStat">0</span></li>
                <li>Intelligence: <span class="playerStat">0</span></li>
                <li>Fortitude: <span class="playerStat">0</span></li>
                <li>Speed: <span class="playerStat">0</span></li>
                <li>Sanity: <span class="playerStat">0</span></li>
            </ul>
        </div>
    </header>

    <div id="index-parchment">
        <section id="textBox">
            <img src="images/parchment.png" alt="Parchment Background">
            <button id="gameText" class="notActive"></button> <!--Figure out how to make appear and disappear in JS-->

            <ul id="options">
                <li id="continue-game" ><button class="choice">New Game</button></li>
                <li><button class="choice">Load Game</button></li>
                <li><button class="choice">Import Game</button></li>
                <li><button class="choice">Export Game</button></li>
            </ul>
            <nav id="menuNavigation">
                <ul id="nav-list">
                    <li id="save-nav"><button>Save</button></li>
                    <li id="load-nav"><button>Load</button></li>
                    <li id="inventory-nav"><button>Inventory</button></li>
                    <li id="history-nav"><button>History</button></li>
                    <li id="exit-nav"><button>Exit</button></li>
                </ul>
            </nav>

        </section>
    </div>

    <section id="saveFiles" class="notActive">
        <img src="/UI and enemies/history.png" alt="save file background">
        <header>
            <div></div>
            <h2>Save Files</h2>
            <button id="closeSave">&#10008</button>
        </header>
        
        <ul>
            <li class="file" id="save0">
                <button>
                    <small>Save #1</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>
                
            </li>
            <li class="file" id="save1">
                <button>
                    <small>Save #2</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>
            </li>
            <li class="file" id="save2">
                <button>
                    <small>Save #3</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>

            </li>
            <li class="file" id="save3">
                <button>
                    <small>Save #4</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>
            </li>
            <li class="file" id="save4">
                <button>
                    <small>Save #5</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>
            </li>
            <li class="file" id="save5">
                <button>
                    <small>Save #6</small>
                    <img src="./images/saveBorder.png" alt="save file scene">
                </button>
            </li>
        </ul>
    </section>

    <section id="loadSaveFiles">

    </section>
    <section id="history">

    </section>
    <section id="inventory">
        <img src="UI and enemies/history.png" alt="inventory scroll">
    </section>
-->

    <script src="script.js" type="module"></script>
</body>

</html>
