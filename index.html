<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Machinations</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--Kings-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kings&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--Jacquard 24-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+24&family=Kings&display=swap" rel="stylesheet">
</head>

<body id="index-body">
    <section class="curtains">
        <div id="right-facing-curtain">
            <img src="images/right-facing-curtain.png">
        </div>
        <div id="left-facing-curtain">
            <img src="images/left-facing-curtain.png">
        </div>
    </section>
    <nav>
        <h1>Kingdom Machinations</h1>
    </nav>

    <header class="border-container">
        <img src="images/border.png" alt="Decorative Border" class="border-img" id="scene">
    </header>

    <section class="background">
        <!--idk if you would want to use JS here so ill wait-->
    </section>

    <div id="index-parchment">
        <section id="textBox">
            <img src="images/parchment.png" alt="Parchment Background">

            <ul id="options">

                <li id="continue-game">New Game</li>

                <li>Load Game</li>

                <li id="import-game">Import Game</li>
                <div class="import-content">
                    <h3>Title</h3>
                    <p>Click here</p>
                </div>
                <a href="#" class="clickable-import"></a>

                <li>Export Game</li>

            </ul>

        </section>
    </div>
    <script src="script.js" type="module"></script>
</body>

</html>
